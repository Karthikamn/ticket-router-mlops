apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ticket-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.10-slim
          command: ["/bin/bash", "-lc", "/entry/server_entry.sh"]
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.ticket-mlops.svc.cluster.local:5000"
          volumeMounts:
            - name: mlflow-vol
              mountPath: /mlflow
            - name: entry
              mountPath: /entry
      volumes:
        - name: mlflow-vol
          persistentVolumeClaim:
            claimName: mlflow-pvc
        - name: entry
          configMap:
            name: mlflow-entry-cm
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: ticket-mlops
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-entry-cm
  namespace: ticket-mlops
data:
  server_entry.sh: |
    #!/usr/bin/env bash
    set -e
    pip install --no-cache-dir mlflow==2.11.3
    mkdir -p /mlflow/db /mlflow/artifacts
    mlflow server \
      --backend-store-uri sqlite:////mlflow/db/mlflow.db \
      --default-artifact-root /mlflow/artifacts \
      --host 0.0.0.0 \
      --port 5000
